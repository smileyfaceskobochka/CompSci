<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Racing Teams</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
<h1>Racing Teams</h1>
<nav class="nav nav-pills mb-4">
<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/series">Series</a>
<a class="nav-link active" href="/teams">Teams</a>
<a class="nav-link" href="/drivers">Drivers</a>
</nav>
<a class="btn btn-primary mb-3" href="/teams/add">Add Team</a>
<div th:each="series : ${seriesList}">
<h3 th:text="${series.name}">Series</h3>
<table class="table table-striped" th:if="${not #lists.isEmpty(series.teams)}">
<thead><tr><th>ID</th><th>Name</th><th>Principal</th><th>Base</th><th>Points</th><th>Wins</th><th>Podiums</th><th>Actions</th></tr></thead>
<tbody>
<tr th:each="team : ${series.teams}">
<td th:text="${team.id}">1</td>
<td th:text="${team.name}">Name</td>
<td th:text="${team.principalName}">Principal</td>
<td th:text="${team.baseLocation}">Base</td>
<td th:text="${team.points}">0</td>
<td th:text="${team.wins}">0</td>
<td th:text="${team.podiums}">0</td>
<td>
<a class="btn btn-sm btn-warning" th:href="@{/teams/edit/{id}(id=${team.id})}">Edit</a>
<a class="btn btn-sm btn-danger" th:href="@{/teams/delete/{id}(id=${team.id})}" onclick="return confirm('Delete this team?')">Delete</a>
</td>
</tr>
</tbody>
</table>
<p th:if="${#lists.isEmpty(series.teams)}" class="text-muted">No teams in this series.</p>
</div>
</div>
</body>
</html>
