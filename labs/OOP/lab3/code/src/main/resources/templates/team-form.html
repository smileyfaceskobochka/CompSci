<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Editor</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a href="/" class="nav-brand">🏎 Racing System</a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/teams">Teams</a>
            <a href="/drivers">Drivers</a>
        </div>
    </div>
</nav>

<main class="content">
    <div class="page-header">
        <h1 th:text="${team.id == null} ? 'Add New Team' : 'Edit Team'"></h1>
        <a href="/" class="btn btn-ghost">← Back</a>
    </div>

    <form class="form-card" action="#" th:action="@{/teams/save}" th:object="${team}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Series *</label>
            <select th:field="*{series.id}" required>
                <option value="">— Select Series —</option>
                <option th:each="ser : ${seriesList}"
                        th:value="${ser.id}"
                        th:text="${ser.name}"></option>
            </select>
        </div>

        <div class="form-group">
            <label>Team Name *</label>
            <input type="text" th:field="*{name}" required />
        </div>

        <div class="form-group">
            <label>Principal Name *</label>
            <input type="text" th:field="*{principalName}" required />
        </div>

        <div class="form-group">
            <label>Base Location *</label>
            <input type="text" th:field="*{baseLocation}" required />
        </div>

        <div class="form-group">
            <label>Power Unit</label>
            <input type="text" th:field="*{powerUnit}" />
        </div>

        <div class="form-group">
            <label>Points</label>
            <input type="number" th:field="*{points}" required />
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-save">Save Team</button>
            <a href="/" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
