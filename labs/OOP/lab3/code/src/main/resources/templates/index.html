<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Racing Management System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
<h1>Racing Management System</h1>
<nav class="nav nav-pills mb-4">
<a class="nav-link active" href="/">Home</a>
<a class="nav-link" href="/series">Series</a>
<a class="nav-link" href="/teams">Teams</a>
<a class="nav-link" href="/drivers">Drivers</a>
</nav>
<div class="row">
<div class="col-md-6">
<h2>Teams Overview</h2>
<table class="table table-striped" th:if="${not #lists.isEmpty(teams)}">
<thead><tr><th>Name</th><th>Series</th><th>Points</th></tr></thead>
<tbody>
<tr th:each="team : ${teams}">
<td th:text="${team.name}">Name</td>
<td th:text="${team.series?.name ?: 'N/A'}">Series</td>
<td th:text="${team.points}">0</td>
</tr>
</tbody>
</table>
<p th:if="${#lists.isEmpty(teams)}" class="text-muted">No teams registered yet.</p>
</div>
<div class="col-md-6">
<h2>Drivers Standings</h2>
<table class="table table-striped" th:if="${not #lists.isEmpty(drivers)}">
<thead><tr><th>Driver</th><th>Number</th><th>Points</th></tr></thead>
<tbody>
<tr th:each="driver : ${drivers}">
<td th:text="${driver.firstName} + ' ' + ${driver.lastName}">Driver</td>
<td th:text="${driver.racingNumber}">#</td>
<td th:text="${driver.points}">0</td>
</tr>
</tbody>
</table>
<p th:if="${#lists.isEmpty(drivers)}" class="text-muted">No drivers registered yet.</p>
</div>
</div>
<h2 class="mt-4">Standings by Series</h2>
<div th:each="entry : ${standingsBySeries}">
<h3 th:text="${entry.key.name}">Series</h3>
<table class="table table-sm" th:if="${not #lists.isEmpty(entry.value)}">
<thead><tr><th>Driver</th><th>Team</th><th>Points</th></tr></thead>
<tbody>
<tr th:each="driver : ${entry.value}">
<td th:text="${driver.firstName} + ' ' + ${driver.lastName}">Driver</td>
<td th:text="${driver.team.name}">Team</td>
<td th:text="${driver.points}">0</td>
</tr>
</tbody>
</table>
</div>
</div>
</body>
</html>
