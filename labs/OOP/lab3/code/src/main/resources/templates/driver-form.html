<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Driver Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
<h1 th:if="${driver.id != null}">Edit Driver</h1>
<h1 th:unless="${driver.id != null}">Add Driver</h1>
<nav class="nav nav-pills mb-4">
<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/drivers">Drivers</a>
</nav>
<form action="/drivers/save" method="post" class="row g-3">
<input type="hidden" name="id" th:value="${driver.id}"/>
<div class="col-md-6">
<label class="form-label">First Name</label>
<input type="text" class="form-control" name="firstName" th:value="${driver.firstName}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Last Name</label>
<input type="text" class="form-control" name="lastName" th:value="${driver.lastName}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Racing Number</label>
<input type="number" class="form-control" name="racingNumber" th:value="${driver.racingNumber}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Points</label>
<input type="number" class="form-control" name="points" th:value="${driver.points}"/>
</div>
<div class="col-md-6">
<label class="form-label">Team</label>
<select class="form-select" name="team" th:if="${not #lists.isEmpty(teams)}">
<option th:each="t : ${teams}" th:value="${t.id}" th:text="${t.name}" th:selected="${driver.team != null and driver.team.id == t.id}">Team</option>
</select>
</div>
<div class="col-12">
<button type="submit" class="btn btn-primary">Save</button>
<a href="/drivers" class="btn btn-secondary">Cancel</a>
</div>
</form>
</div>
</body>
</html>
