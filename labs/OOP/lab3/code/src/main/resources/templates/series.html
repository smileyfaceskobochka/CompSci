<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Racing Series</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
<h1>Racing Series</h1>
<nav class="nav nav-pills mb-4">
<a class="nav-link" href="/">Home</a>
<a class="nav-link active" href="/series">Series</a>
<a class="nav-link" href="/teams">Teams</a>
<a class="nav-link" href="/drivers">Drivers</a>
</nav>
<a class="btn btn-primary mb-3" href="/series/add">Add Series</a>
<table class="table table-striped">
<thead><tr><th>ID</th><th>Name</th><th>Official Name</th><th>Headquarters</th><th>Governing Body</th><th>Founded</th><th>Rounds</th><th>Actions</th></tr></thead>
<tbody>
<tr th:each="series : ${seriesList}">
<td th:text="${series.id}">1</td>
<td th:text="${series.name}">Name</td>
<td th:text="${series.officialName}">Official</td>
<td th:text="${series.headquarters}">HQ</td>
<td th:text="${series.governingBody}">Body</td>
<td th:text="${series.foundedYear}">Year</td>
<td th:text="${series.rounds}">Rounds</td>
<td>
<a class="btn btn-sm btn-warning" th:href="@{/series/edit/{id}(id=${series.id})}">Edit</a>
<a class="btn btn-sm btn-danger" th:href="@{/series/delete/{id}(id=${series.id})}" onclick="return confirm('Delete this series?')">Delete</a>
</td>
</tr>
</tbody>
</table>
</div>
</body>
</html>
