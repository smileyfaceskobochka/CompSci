<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Editor</title>
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
<nav class="navbar">
    <div class="navbar-inner">
        <a href="/" class="nav-brand">🏎 Racing System</a>
        <div class="nav-links">
            <a href="/">Dashboard</a>
            <a href="/teams">Teams</a>
            <a href="/drivers">Drivers</a>
        </div>
    </div>
</nav>

<main class="content">
    <div class="page-header">
        <h1 th:text="${driver.id == null} ? 'Add New Driver' : 'Edit Driver'"></h1>
        <a href="/" class="btn btn-ghost">← Back</a>
    </div>

    <form class="form-card" action="#" th:action="@{/drivers/save}" th:object="${driver}" method="post">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label>Team *</label>
            <select th:field="*{team.id}" required>
                <option value="">— Select Team —</option>
                <option th:each="t : ${teams}"
                        th:value="${t.id}"
                        th:text="${t.name} + ' (' + ${t.series.name} + ')'"></option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>First Name *</label>
                <input type="text" th:field="*{firstName}" required />
            </div>

            <div class="form-group">
                <label>Last Name *</label>
                <input type="text" th:field="*{lastName}" required />
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label>Racing Number * (1-99)</label>
                <input type="number" th:field="*{racingNumber}" min="1" max="99" required />
            </div>

            <div class="form-group">
                <label>Points</label>
                <input type="number" th:field="*{points}" required />
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-save">Save Driver</button>
            <a href="/" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
