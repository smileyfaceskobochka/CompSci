<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Team Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
<h1 th:if="${team.id != null}">Edit Team</h1>
<h1 th:unless="${team.id != null}">Add Team</h1>
<nav class="nav nav-pills mb-4">
<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/teams">Teams</a>
</nav>
<form action="/teams/save" method="post" class="row g-3">
<input type="hidden" name="id" th:value="${team.id}"/>
<div class="col-md-6">
<label class="form-label">Name</label>
<input type="text" class="form-control" name="name" th:value="${team.name}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Principal Name</label>
<input type="text" class="form-control" name="principalName" th:value="${team.principalName}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Base Location</label>
<input type="text" class="form-control" name="baseLocation" th:value="${team.baseLocation}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Series</label>
<select class="form-select" name="series" th:if="${not #lists.isEmpty(seriesList)}">
<option th:each="s : ${seriesList}" th:value="${s.id}" th:text="${s.name}" th:selected="${team.series != null and team.series.id == s.id}">Series</option>
</select>
</div>
<div class="col-md-4">
<label class="form-label">Points</label>
<input type="number" class="form-control" name="points" th:value="${team.points}"/>
</div>
<div class="col-md-4">
<label class="form-label">Wins</label>
<input type="number" class="form-control" name="wins" th:value="${team.wins}"/>
</div>
<div class="col-md-4">
<label class="form-label">Podiums</label>
<input type="number" class="form-control" name="podiums" th:value="${team.podiums}"/>
</div>
<div class="col-md-6">
<label class="form-label">Power Unit</label>
<input type="text" class="form-control" name="powerUnit" th:value="${team.powerUnit}"/>
</div>
<div class="col-md-6">
<label class="form-label">Team Color</label>
<input type="text" class="form-control" name="teamColor" th:value="${team.teamColor}"/>
</div>
<div class="col-12">
<button type="submit" class="btn btn-primary">Save</button>
<a href="/teams" class="btn btn-secondary">Cancel</a>
</div>
</form>
</div>
</body>
</html>
