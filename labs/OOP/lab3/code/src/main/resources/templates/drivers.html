<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Racing Drivers</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1>Racing Drivers</h1>
        <nav class="nav nav-pills mb-4">
            <a class="nav-link" href="/">Home</a>
            <a class="nav-link" href="/series">Series</a>
            <a class="nav-link" href="/teams">Teams</a>
            <a class="nav-link active" href="/drivers">Drivers</a>
        </nav>
        <a class="btn btn-primary mb-3" href="/drivers/add">Add Driver</a>
        <div th:each="entry : ${standingsBySeries}">
            <h3 th:text="${entry.key.name}">Series</h3>
            <table class="table table-striped" th:if="${not #lists.isEmpty(entry.value)}">
                <thead><tr><th>ID</th><th>Name</th><th>Number</th><th>Team</th><th>Points</th><th>Actions</th></tr></thead>
                <tbody>
                    <tr th:each="driver : ${entry.value}">
                        <td th:text="${driver.id}">1</td>
                        <td th:text="${driver.firstName} + ' ' + ${driver.lastName}">Driver</td>
                        <td th:text="${driver.racingNumber}">#</td>
                        <td th:text="${driver.team.name}">Team</td>
                        <td th:text="${driver.points}">0</td>
                        <td>
                            <a class="btn btn-sm btn-warning" th:href="@{/drivers/edit/{id}(id=${driver.id})}">Edit</a>
                            <a class="btn btn-sm btn-danger" th:href="@{/drivers/delete/{id}(id=${driver.id})}" onclick="return confirm('Delete this driver?')">Delete</a>
                        </td>
                    </tr>
                </tbody>
            </table>
            <p th:if="${#lists.isEmpty(entry.value)}" class="text-muted">No drivers in this series.</p>
        </div>
    </div>
</body>
</html>
