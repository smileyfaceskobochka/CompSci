<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DRIVERS — Racing Management</title>
<link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div class="topbar">
  <a href="/" class="topbar-brand">RACING SYSTEM</a>
  <nav class="topbar-nav">
    <a href="/">DASHBOARD</a>
    <a href="/series">SERIES</a>
    <a href="/teams">TEAMS</a>
    <a href="/drivers" class="active">DRIVERS</a>
  </nav>
  <div class="topbar-status">
    <span class="status-dot live"></span>
    <span class="status-label">LIVE</span>
  </div>
</div>

<div class="page-wrap">

  <aside class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Navigation</div>
      <a href="/" class="sidebar-btn">DASHBOARD</a>
      <a href="/series" class="sidebar-btn">SERIES</a>
      <a href="/teams" class="sidebar-btn">TEAMS</a>
      <a href="/drivers" class="sidebar-btn primary">DRIVERS</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Actions</div>
      <a href="/drivers/add" class="sidebar-btn add">+ ADD DRIVER</a>
    </div>
  </aside>

  <main class="main-content">

    <div class="page-header">
      <h1>ALL DRIVERS</h1>
      <a href="/drivers/add" class="btn btn-add">+ ADD DRIVER</a>
    </div>

    <table class="data-table">
      <thead>
        <tr>
          <th>#</th><th>Driver</th><th>No.</th><th>Pts</th><th>Team</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <th:block th:each="series : ${seriesList}">
          <tr class="series-row"
              th:classappend="${series.name == 'Formula 1' ? 'f1' : (series.name == 'Formula 2' ? 'f2' : (series.name == 'Formula E' ? 'fe' : (series.name == 'WEC' ? 'wec' : (series.name == 'IndyCar' ? 'indy' : (series.name == 'MotoGP' ? 'moto' : '')))))}">
            <td colspan="6" th:text="${series.name + ' — ' + series.officialName}"></td>
          </tr>
          <th:block th:each="team : ${series.teams}">
            <tr th:each="driver : ${team.drivers}">
              <td th:text="${driver.id}" class="dim"></td>
              <td class="name">
                <span class="team-accent" th:style="'background-color:' + ${team.teamColor}"></span>
                <span th:text="${driver.firstName + ' ' + driver.lastName}"></span>
              </td>
              <td><span class="badge num" th:text="'#' + ${driver.racingNumber}"></span></td>
              <td class="pts yellow" th:text="${driver.points}"></td>
              <td th:text="${team.name}"></td>
              <td class="actions">
                <a th:href="@{/drivers/edit/{id}(id=${driver.id})}" class="btn btn-sm edit">Edit</a>
                <a th:href="@{/drivers/delete/{id}(id=${driver.id})}" class="btn btn-sm del"
                   onclick="return confirm('Delete this driver?');">Delete</a>
              </td>
            </tr>
          </th:block>
        </th:block>
      </tbody>
    </table>

  </main>

  <aside class="sidebar-right">
    <div class="tlm-panel">
      <div class="tlm-panel-header">Series</div>
      <div class="tlm-panel-value blue" style="font-size:20px" th:text="${seriesList.size()}"></div>
      <div class="tlm-panel-sub">racing championships</div>
    </div>
  </aside>

</div>

<div class="bottombar">
  <div class="stat">
    <span class="stat-dot"></span>
    <span class="stat-label-bot">DB</span>
    <span class="stat-value-bot">LIVE</span>
  </div>
  <div class="stat">
    <span class="stat-label-bot">Series</span>
    <span class="stat-value-bot" th:text="${seriesList.size()}"></span>
  </div>
  <div class="db">Java / Spring Boot 2.6 / Thymeleaf</div>
</div>

</body>
</html>
