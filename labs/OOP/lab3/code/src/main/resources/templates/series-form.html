<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"/>
<title>Series Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
</head>
<body>
<div class="container mt-4">
<h1 th:if="${series.id != null}">Edit Series</h1>
<h1 th:unless="${series.id != null}">Add Series</h1>
<nav class="nav nav-pills mb-4">
<a class="nav-link" href="/">Home</a>
<a class="nav-link" href="/series">Series</a>
</nav>
<form action="/series/save" method="post" class="row g-3">
<input type="hidden" name="id" th:value="${series.id}"/>
<div class="col-md-6">
<label class="form-label">Name</label>
<input type="text" class="form-control" name="name" th:value="${series.name}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Official Name</label>
<input type="text" class="form-control" name="officialName" th:value="${series.officialName}"/>
</div>
<div class="col-md-6">
<label class="form-label">Headquarters</label>
<input type="text" class="form-control" name="headquarters" th:value="${series.headquarters}" required/>
</div>
<div class="col-md-6">
<label class="form-label">Governing Body</label>
<input type="text" class="form-control" name="governingBody" th:value="${series.governingBody}"/>
</div>
<div class="col-md-6">
<label class="form-label">Founded Year</label>
<input type="number" class="form-control" name="foundedYear" th:value="${series.foundedYear}"/>
</div>
<div class="col-md-6">
<label class="form-label">Rounds</label>
<input type="number" class="form-control" name="rounds" th:value="${series.rounds}"/>
</div>
<div class="col-12">
<button type="submit" class="btn btn-primary">Save</button>
<a href="/series" class="btn btn-secondary">Cancel</a>
</div>
</form>
</div>
</body>
</html>
